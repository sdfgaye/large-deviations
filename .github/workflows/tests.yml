name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,notebooks]"

      - name: Run unit tests
        run: pytest

      - name: Run notebook smoke tests
        run: |
          pytest --nbmake notebooks/01_bernoulli_exponential_tilting.ipynb
          pytest --nbmake notebooks/02_cramer_bernoulli_tail_risk.ipynb
          pytest --nbmake notebooks/03_bernoulli_importance_sampling.ipynb